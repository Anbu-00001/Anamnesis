name: release

# Build prebuilt `ana` binaries for every platform on a version tag, and attach
# them to the GitHub Release. The Claude Code plugin and `install-ana.sh` fetch
# these, so users never need a Rust toolchain.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cross linker for aarch64 linux
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --bin ana --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          ext=""; [ "${{ matrix.os }}" = "windows-latest" ] && ext=".exe"
          name="ana-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ana${ext}" "dist/${name}${ext}"
          ( cd dist && { sha256sum "${name}${ext}" 2>/dev/null || shasum -a 256 "${name}${ext}"; } > "${name}.sha256" )

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ana-${{ matrix.target }}*
